<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Login - Asset Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="css/animations.css" rel="stylesheet"/>
    <link href="css/background.css" rel="stylesheet"/>
    <style>
        body {
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>

<body>
    <div class="w-full max-w-md px-6">
        <!-- Logo & Title -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-blue-600 mb-4">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4">
                    </path>
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-white mb-2">Asset</h1>
            <p class="text-gray-400">Management System</p>
        </div>

        <!-- Login Card -->
        <div class="bg-slate-800 rounded-2xl shadow-2xl p-8 border border-slate-700">
            <h2 class="text-2xl font-semibold text-white mb-6">Sign In</h2>

            <!-- Error Message -->
            <div id="error-message" class="hidden mb-4 p-3 bg-red-500/10 border border-red-500/50 rounded-lg">
                <p class="text-red-400 text-sm"></p>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Username</label>
                    <input type="text" id="username" name="username" required
                        class="w-full px-4 py-3 bg-slate-700 border border-slate-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        placeholder="Enter your username" />
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Password</label>
                    <input type="password" id="password" name="password" required
                        class="w-full px-4 py-3 bg-slate-700 border border-slate-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        placeholder="Enter your password" />
                </div>

                <button type="submit" id="login-btn"
                    class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg transition-colors duration-200 flex items-center justify-center">
                    <span id="btn-text">Sign In</span>
                    <span id="btn-loading" class="hidden">
                        <svg class="animate-spin h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none"
                            viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                            </circle>
                            <path class="opacity-75" fill="currentColor"
                                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                            </path>
                        </svg>
                    </span>
                </button>
            </form>

            <!-- Helper Text -->
            <div class="mt-6 text-center">
                <p class="text-sm text-gray-400">
                    Default: <span class="text-blue-400 font-mono">admin / admin123</span>
                </p>
            </div>
        </div>

        <!-- Footer -->
        <p class="text-center text-gray-500 text-sm mt-8">
            © 2026 Asset Management System
        </p>

        <!-- GitHub Link with Animation -->
        <div class="flex justify-center items-center mt-4 py-4 w-full">
            <a href="https://github.com/ReihanZanuar/Asset-Management-System-V2" target="_blank"
                rel="noopener noreferrer"
                class="relative inline-flex items-center justify-center group cursor-pointer px-4 py-3"
                style="width: 160px; height: 50px;"
                title="View on GitHub">
                <!-- GitHub Icon Container -->
                <div class="absolute left-1/2 -translate-x-1/2 group-hover:left-0 group-hover:translate-x-0 flex items-center justify-center w-10 h-10 rounded-full bg-slate-800 group-hover:bg-slate-700 border border-slate-700 group-hover:border-slate-600 transition-all duration-500 group-hover:rotate-[360deg]">
                    <svg class="w-5 h-5 text-gray-400 group-hover:text-white transition-colors duration-500"
                        fill="currentColor" viewBox="0 0 24 24">
                        <path fill-rule="evenodd"
                            d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"
                            clip-rule="evenodd" />
                    </svg>
                </div>
                <!-- Username that appears on hover -->
                <span class="absolute right-4 text-sm font-semibold text-gray-300 opacity-0 group-hover:opacity-100 transition-opacity duration-500 whitespace-nowrap">
                    ReihanZanuar
                </span>
            </a>
        </div>
    </div>

    <!-- Load API Service -->
    <script src="js/api.js"></script>

    <!-- Login Logic -->
    <script>
        const loginForm = document.getElementById('login-form');
        const errorMessage = document.getElementById('error-message');
        const loginBtn = document.getElementById('login-btn');
        const btnText = document.getElementById('btn-text');
        const btnLoading = document.getElementById('btn-loading');

        // Check if already logged in
        if (api.getToken()) {
            window.location.href = 'dashboard.html';
        }

        // Handle form submission
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            // Hide error
            errorMessage.classList.add('hidden');

            // Show loading
            loginBtn.disabled = true;
            btnText.classList.add('hidden');
            btnLoading.classList.remove('hidden');

            try {
                const response = await api.auth.login(username, password);

                // Success - redirect to dashboard
                window.location.href = 'dashboard.html';
            } catch (error) {
                // Show error
                errorMessage.classList.remove('hidden');
                errorMessage.querySelector('p').textContent = error.message || 'Invalid username or password';

                // Reset button
                loginBtn.disabled = false;
                btnText.classList.remove('hidden');
                btnLoading.classList.add('hidden');
            }
        });
    </script>
</body>

</html>
